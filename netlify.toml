[build]
  command = "export DATABASE_URL=$NETLIFY_DATABASE_URL && sed -i 's/provider = \"sqlite\"/provider = \"postgresql\"/g' prisma/schema.prisma && npx prisma generate && npx prisma db push --accept-data-loss && npx prisma db seed && next build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"

[[plugins]]
  package = "@netlify/plugin-nextjs"
